<svg xmlns="http://www.w3.org/2000/svg" width="780" height="600" viewBox="0 0 780 600" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="780" height="600" fill="#06060c"/>

  <!-- ===================== AVANT ===================== -->
  <text x="32" y="40" fill="#8a8aa0" font-size="14" font-weight="700" letter-spacing="2">AVANT (actuel)</text>

  <!-- header bar -->
  <rect x="24" y="56" width="732" height="92" rx="14" fill="#12121c" stroke="#2a2a3a"/>
  <!-- logo -->
  <circle cx="70" cy="102" r="22" fill="#ffffff"/>
  <circle cx="70" cy="102" r="22" fill="none" stroke="#2a2a3a"/>
  <text x="70" y="107" fill="#06060c" font-size="13" font-weight="800" text-anchor="middle">GHR</text>
  <text x="104" y="96" fill="#e8e8f0" font-size="19" font-weight="800">MediURG</text>
  <text x="104" y="118" fill="#8a8aa0" font-size="11">Pharmacologie d'urgence · SAUV · SMUR · SAU</text>

  <!-- right cluster: ONLINE + 3 boutons, serrés -->
  <rect x="470" y="86" width="92" height="32" rx="16" fill="#10241a" stroke="#1f6b3f"/>
  <circle cx="486" cy="102" r="5" fill="#4ade80"/>
  <text x="498" y="106" fill="#4ade80" font-size="12" font-weight="700">ONLINE</text>

  <rect x="572" y="84" width="40" height="36" rx="9" fill="#161620" stroke="#2a2a3a"/>
  <text x="592" y="107" fill="#e8e8f0" font-size="15" text-anchor="middle">💾</text>

  <rect x="620" y="84" width="44" height="36" rx="9" fill="#161620" stroke="#2a2a3a"/>
  <text x="642" y="107" fill="#e8e8f0" font-size="14" font-weight="700" text-anchor="middle">A+</text>

  <rect x="672" y="84" width="40" height="36" rx="9" fill="#161620" stroke="#2a2a3a"/>
  <text x="692" y="107" fill="#e8e8f0" font-size="15" text-anchor="middle">☀</text>

  <text x="32" y="178" fill="#ff6b76" font-size="12.5">4 contrôles à droite · cibles ~36 px (petites avec gants)</text>

  <!-- ===================== APRÈS ===================== -->
  <text x="32" y="250" fill="#8a8aa0" font-size="14" font-weight="700" letter-spacing="2">APRÈS (proposé — ONLINE/OFFLINE conservé)</text>

  <!-- header bar -->
  <rect x="24" y="266" width="732" height="92" rx="14" fill="#12121c" stroke="#2a2a3a"/>
  <circle cx="70" cy="312" r="22" fill="#ffffff"/>
  <circle cx="70" cy="312" r="22" fill="none" stroke="#2a2a3a"/>
  <text x="70" y="317" fill="#06060c" font-size="13" font-weight="800" text-anchor="middle">GHR</text>
  <text x="104" y="306" fill="#e8e8f0" font-size="19" font-weight="800">MediURG</text>
  <text x="104" y="328" fill="#8a8aa0" font-size="11">Pharmacologie d'urgence · SAUV · SMUR · SAU</text>

  <!-- ONLINE pill conservée (placée juste avant le kebab) -->
  <rect x="588" y="296" width="92" height="32" rx="16" fill="#10241a" stroke="#1f6b3f"/>
  <circle cx="604" cy="312" r="5" fill="#4ade80"/>
  <text x="616" y="316" fill="#4ade80" font-size="12" font-weight="700">ONLINE</text>

  <!-- kebab button grand (48px) -->
  <rect x="690" y="288" width="48" height="48" rx="12" fill="#161620" stroke="#3a3a4d"/>
  <circle cx="714" cy="302" r="3" fill="#e8e8f0"/>
  <circle cx="714" cy="312" r="3" fill="#e8e8f0"/>
  <circle cx="714" cy="322" r="3" fill="#e8e8f0"/>

  <!-- menu déroulant ouvert -->
  <rect x="520" y="346" width="222" height="150" rx="14" fill="#161620" stroke="#3a3a4d"/>
  <rect x="532" y="358" width="198" height="40" rx="9" fill="#1c1c28"/>
  <text x="548" y="383" fill="#e8e8f0" font-size="15">☀</text>
  <text x="574" y="383" fill="#e8e8f0" font-size="14">Thème sombre</text>
  <text x="548" y="427" fill="#e8e8f0" font-size="14" font-weight="700">A+</text>
  <text x="574" y="427" fill="#e8e8f0" font-size="14">Agrandir la police</text>
  <text x="548" y="471" fill="#e8e8f0" font-size="15">💾</text>
  <text x="574" y="471" fill="#e8e8f0" font-size="14">Sauvegarder mes notes</text>

  <text x="32" y="384" fill="#4ade80" font-size="12.5">Badge ONLINE / OFFLINE conservé (info état réseau toujours visible)</text>
  <text x="32" y="406" fill="#4ade80" font-size="12.5">3 réglages regroupés derrière un seul ⋮ (cible 48 px, gants OK)</text>
  <text x="32" y="428" fill="#4ade80" font-size="12.5">Header allégé, plus de place pour le titre, pas de perte d'info</text>

  <!-- petite démo OFFLINE -->
  <text x="32" y="494" fill="#8a8aa0" font-size="12" font-weight="700" letter-spacing="1">Variante OFFLINE (mode avion)</text>
  <rect x="24" y="506" width="732" height="68" rx="14" fill="#12121c" stroke="#2a2a3a"/>
  <circle cx="60" cy="540" r="18" fill="#ffffff"/>
  <text x="60" y="544" fill="#06060c" font-size="11" font-weight="800" text-anchor="middle">GHR</text>
  <text x="90" y="538" fill="#e8e8f0" font-size="16" font-weight="800">MediURG</text>
  <text x="90" y="556" fill="#8a8aa0" font-size="10">Pharmacologie d'urgence</text>
  <rect x="588" y="525" width="92" height="30" rx="15" fill="#3a1a14" stroke="#7a2a1a"/>
  <circle cx="604" cy="540" r="5" fill="#ff6b6b"/>
  <text x="616" y="544" fill="#ff8b8b" font-size="12" font-weight="700">OFFLINE</text>
  <rect x="690" y="518" width="44" height="44" rx="11" fill="#161620" stroke="#3a3a4d"/>
  <circle cx="712" cy="530" r="2.5" fill="#e8e8f0"/>
  <circle cx="712" cy="540" r="2.5" fill="#e8e8f0"/>
  <circle cx="712" cy="550" r="2.5" fill="#e8e8f0"/>

  <text x="32" y="592" fill="#5a5a70" font-size="10.5" font-style="italic">Maquette indicative — couleurs réelles de l'app (thème sombre).</text>
</svg>
