<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF3B30" />
  <meta name="description" content="MediURG - Livret pharmacologique d'urgence pour SAUV, SMUR et SAU. Accès hors ligne à plus de 70 médicaments critiques." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MediURG" />
  <meta name="color-scheme" content="dark light" />
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-32x32.png" sizes="32x32" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>MediURG - Pharmacologie d'Urgence Hors Ligne</title>
  <style>
    /* Fond peint avant le chargement du CSS bundle pour éviter le flash gris/blanc
       au lancement de la PWA (entre la fin du splash et l'hydratation React). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #0a0a12; color: #e8e8f0; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    /* Setup de l'history AVANT React (évite l'écran vide sous Firefox PWA Android
       quand l'user tape retour avant que React ait monté son popstate handler).
       Pattern : sentinelle au fond + état actif au-dessus. Le popstate React
       (App.js) prendra le relais une fois monté. */
    (function () {
      try {
        if (!window.history.state || !window.history.state.mediurg) {
          var here = window.location.href;
          window.history.replaceState(
            { mediurg: { page: 'medicaments', protoCategory: 'PISU', modal: null, sentinel: true } },
            '',
            here
          );
          window.history.pushState(
            { mediurg: { page: 'medicaments', protoCategory: 'PISU', modal: null } },
            '',
            here
          );
        }
      } catch (e) {}
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
          .then(r => console.log('✓ Service Worker enregistré:', r))
          .catch(e => console.warn('Service Worker échoué:', e));
      });
    }
  </script>
</body>
</html>
