name: CI

# Filet de securite avant que le code arrive en prod via Vercel auto-deploy.
# Tourne sur PR et sur push main : si quelqu'un commit avec --no-verify
# (bypass du pre-commit hook husky), CI rattrape le coup.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Runtime Node 24 explicite pour toutes les JavaScript actions — fait taire
# l'avertissement de dépréciation Node 20 émis par les artifact-actions, qui
# déclarent encore node20 dans leur metadata (vérifié : actions/upload-artifact
# et download-artifact @v4 ET @v5 = node20 ; seule la branche main, non taguée,
# passe à node24). Le runtime des runners est déjà Node 24 depuis la date de
# dépréciation (2025-09-19), donc ce flag ne change que l'étiquette/le warning.
#
# Choix DÉLIBÉRÉ de garder ce flag plutôt que :
#  - épingler les actions à @main (code non publié, cible mouvante), ou
#  - supprimer les artifact-actions (on perdrait les artefacts de diagnostic :
#    rapports, captures offline).
# C'est la solution officielle GitHub et la moins invasive. À réévaluer si/quand
# une version TAGUÉE des artifact-actions cible nativement node24 (alors : bump
# de version + retrait possible de ce flag).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Qualite code et donnees
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=moderate

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Dead code check (knip)
        run: npm run knip

      - name: Asset references check
        run: npm run verify:asset-refs

      - name: Dead CSS check
        run: npm run verify:dead-css

      - name: Tests (vitest)
        run: npm test

      - name: Clinical data report (strict)
        run: npm run report:data:strict

      - name: Upload clinical report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: rapport-donnees-cliniques
          path: docs/RAPPORT_DONNEES_CLINIQUES.md
          if-no-files-found: ignore

  security:
    name: Securite config
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security config check
        run: npm run verify:security

  build:
    name: Build et budgets
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (vite + workbox)
        run: npm run build

      - name: Security config check (build)
        run: npm run verify:security

      - name: Bundle budget JS/CSS
        run: npm run verify:bundle-budget

      - name: PWA manifest check
        run: npm run verify:pwa-manifest

      - name: PWA offline static checks
        run: npm run verify:pwa-offline

      - name: Upload build
        uses: actions/upload-artifact@v5
        with:
          name: build
          path: build
          if-no-files-found: error

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bundle-budget
          path: build/reports
          if-no-files-found: ignore

  offline:
    name: Offline navigateur et clavier
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v5
        with:
          name: build
          path: build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: PWA offline browser checks
        run: npm run verify:pwa-offline:browser

      - name: Offline screenshots baseline
        run: npm run verify:offline-screenshots

      - name: Keyboard accessibility checks
        run: npm run verify:a11y-keyboard

      - name: Critical E2E flow
        run: npm run verify:e2e-critical

      - name: Runtime performance budget
        run: npm run verify:perf-runtime

      - name: Upload offline screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: offline-screenshots
          path: build/offline-screenshots
          if-no-files-found: ignore

      - name: Upload runtime reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: runtime-reports
          path: build/reports
          if-no-files-found: ignore
