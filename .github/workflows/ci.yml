name: CI

# Filet de securite avant que le code arrive en prod via Vercel auto-deploy.
# Tourne sur PR et sur push main : si quelqu'un commit avec --no-verify
# (bypass du pre-commit hook husky), CI rattrape le coup.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Actions officielles épinglées sur leurs versions Node 24 taguées.
jobs:
  quality:
    name: Qualite code et donnees
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit (npm)
        run: npm audit --audit-level=moderate

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Dead code check (knip)
        run: npm run knip

      - name: Asset references check
        run: npm run verify:asset-refs

      - name: Dead CSS check
        run: npm run verify:dead-css

      - name: Tests (vitest)
        run: npm test

      - name: Clinical data report (strict)
        run: npm run report:data:strict

      - name: Upload clinical report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rapport-donnees-cliniques
          path: docs/RAPPORT_DONNEES_CLINIQUES.md
          if-no-files-found: ignore

  security:
    name: Securite config
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security config check
        run: npm run verify:security

  build:
    name: Build et budgets
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (vite + workbox)
        run: npm run build

      - name: Security config check (build)
        run: npm run verify:security

      - name: Bundle budget JS/CSS
        run: npm run verify:bundle-budget

      - name: PWA manifest check
        run: npm run verify:pwa-manifest

      - name: PWA offline static checks
        run: npm run verify:pwa-offline

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build
          if-no-files-found: error

      - name: Upload bundle report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-budget
          path: build/reports
          if-no-files-found: ignore

  offline:
    name: Offline navigateur et clavier
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build
          path: build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: PWA offline browser checks
        run: npm run verify:pwa-offline:browser

      - name: Offline screenshots baseline
        run: npm run verify:offline-screenshots

      - name: Keyboard accessibility checks
        run: npm run verify:a11y-keyboard

      - name: Critical E2E flow
        run: npm run verify:e2e-critical

      - name: Runtime performance budget
        run: npm run verify:perf-runtime

      - name: Upload offline screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: offline-screenshots
          path: build/offline-screenshots
          if-no-files-found: ignore

      - name: Upload runtime reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-reports
          path: build/reports
          if-no-files-found: ignore
